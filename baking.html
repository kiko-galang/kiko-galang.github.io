<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baking | Kiko Galang</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px;
      color: #222;
    }
    a { color: #1a0dab; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 2em; font-weight: normal; margin-bottom: 8px; }
    .tagline { color: #666; margin-bottom: 40px; }

    .gallery {
      columns: 3;
      column-gap: 16px;
    }
    .gallery img {
      width: 100%;
      display: block;
      margin-bottom: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .gallery img:hover { opacity: 0.85; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      color: #fff;
      font-size: 2.2em;
      cursor: pointer;
      opacity: 0.7;
      line-height: 1;
    }
    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <a href="index.html">← Back to home</a>
  <h1>Baking</h1>
  <p class="tagline">Cookies, cakes, and things made with love.</p>

  <div class="gallery" id="gallery"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">×</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // ── To add new photos, just add the filename to this list ──
    const photos = [
      "IMG_0922.JPG",
      "IMG_0206.JPEG",
    ];
    // ──────────────────────────────────────────────────────────

    const gallery = document.getElementById('gallery');
    photos.forEach(name => {
      const img = document.createElement('img');
      img.src = `images/baking/${name}`;
      img.alt = 'Baking';
      img.onclick = () => openLightbox(img.src);
      gallery.appendChild(img);
    });

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
