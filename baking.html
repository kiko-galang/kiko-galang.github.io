<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baking | Kiko Galang</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment:  #f4efe4;
      --parchment2: #ede6d6;
      --ink:        #2a1f0e;
      --ink-muted:  #6b5c45;
      --ink-faint:  #a8977e;
      --teal:       #3d7068;
      --teal-pale:  #c8ddd8;
      --gold:       #b5862a;
      --rule:       #c9bba2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
      line-height: 1.75;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      z-index: 9999;
    }

    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 28px 100px;
    }

    /* ── Back link ── */
    .back {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 36px;
      transition: color .15s;
    }
    .back:hover { color: var(--teal); }

    /* ── Header ── */
    .page-header { margin-bottom: 40px; }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8em, 4vw, 2.4em);
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── Gallery ── */
    .gallery {
      columns: 3;
      column-gap: 14px;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 5px;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      border-radius: 5px;
      transition: opacity .2s ease;
    }
    .gallery-item:hover img { opacity: 0.88; }

    /* small caption indicator dot for photos with captions */
    .gallery-item.has-caption::after {
      content: '';
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      opacity: 0.85;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(244, 239, 228, 0.96);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: zoom-out;
      padding: 40px 24px;
    }
    .lightbox.open { display: flex; }

    .lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      max-width: 860px;
      width: 100%;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 76vh;
      object-fit: contain;
      border-radius: 5px;
      box-shadow: 0 8px 40px rgba(42,31,14,.15);
      cursor: default;
    }

    .lightbox-caption {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.95em;
      color: var(--ink-muted);
      text-align: center;
      max-width: 560px;
      line-height: 1.6;
      min-height: 1.4em;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      transition: color .15s;
    }
    .lightbox-close:hover { color: var(--teal); }

    /* ── Footer ── */
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-family: 'Space Mono', monospace;
      font-size: 8.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    footer a { color: var(--ink-faint); text-decoration: none; }
    footer a:hover { color: var(--teal); }

    @media (max-width: 640px) { .gallery { columns: 2; } }
  </style>
</head>
<body>
<div class="wrapper">

  <a class="back" href="index.html">← Back to home</a>

  <div class="page-header">
    <h1>Baking</h1>
    <p class="page-subtitle">Cookies, cakes, and things made with love · Weekly for friends &amp; community</p>
  </div>

  <div class="gallery" id="gallery"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">[ close × ]</span>
    <div class="lightbox-inner" onclick="event.stopPropagation()">
      <img id="lightbox-img" src="" alt="">
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
  </div>

  <footer>
    <span>Kiko Galang · Baking</span>
    <span><a href="index.html">← Back to home</a></span>
  </footer>

</div>

<script>
  // ── Photos: { file, caption (optional) } ────────────────
  // Order: Strawberry Sando, Milk Bread, Mango Royale,
  //        Black Sesame+Oreo, Black Sesame Matcha, Madeleines, remaining
  const photos = [
    // Strawberry Sando
    { file: "IMG_0922.JPG",   caption: "Strawberry Sando with Homemade Japanese Milk Bread" },
    { file: "IMG_0921.JPG",   caption: "Strawberry Sando with Homemade Japanese Milk Bread" },

    // Japanese Milk Bread
    { file: "IMG_0914.JPG",   caption: "Japanese Milk Bread" },
    { file: "IMG_0915.JPG",   caption: "Japanese Milk Bread" },

    // Mango Royale
    { file: "IMG_0916.JPG",   caption: "Mango Royale" },
    { file: "IMG_0917.JPG",   caption: "Mango Royale" },

    // Black Sesame and Oreo Black Sesame Cookies
    { file: "IMG_0837.JPG",   caption: "Black Sesame and Oreo Black Sesame Cookies" },
    { file: "IMG_0838.JPG",   caption: "Black Sesame and Oreo Black Sesame Cookies" },

    // Black Sesame Matcha Shortbreads
    { file: "IMG_0620.JPG",   caption: "Black Sesame Matcha Shortbreads" },
    { file: "IMG_0621.JPG",   caption: "Black Sesame Matcha Shortbreads" },
    { file: "IMG_0622.JPG",   caption: "Black Sesame Matcha Shortbreads" },

    // Lemon Rosemary Madeleines
    { file: "IMG_0633.JPG",   caption: "Lemon Rosemary Madeleines" },
    { file: "IMG_0634.JPG",   caption: "Lemon Rosemary Madeleines" },

    // Black Sesame Swirl Cookies
    { file: "IMG_0508.JPG",   caption: "Black Sesame Swirl Cookies" },
    { file: "IMG_0509.JPG",   caption: "Black Sesame Swirl Cookies" },
    { file: "IMG_0510.JPG",   caption: "Black Sesame Swirl Cookies" },
    { file: "IMG_0511.JPG",   caption: "Black Sesame Swirl Cookies" },
    { file: "IMG_0513.JPG",   caption: "Black Sesame Swirl Cookies" },

    // Banana Muffins
    { file: "DSCF5465.JPG",   caption: "Banana Chocolate Muffin, Banana Walnut Muffin, Banana Chocolate Walnut Muffin" },

    // Filipino Adobo Chocolate Chip
    { file: "IMG_0752.JPG",   caption: "Filipino Adobo Chocolate Chip Cookies" },
    { file: "IMG_0753.JPG",   caption: "Filipino Adobo Chocolate Chip Cookies" },
    { file: "IMG_0754.JPG",   caption: "Filipino Adobo Chocolate Chip Cookies" },
  ];
  // ─────────────────────────────────────────────────────────

  const gallery = document.getElementById('gallery');

  photos.forEach(({ file, caption }) => {
    const item = document.createElement('div');
    item.className = 'gallery-item' + (caption ? ' has-caption' : '');

    const img = document.createElement('img');
    img.src = `images/baking/${file}`;
    img.alt = caption || 'Baking';
    img.loading = 'lazy';

    item.appendChild(img);
    item.onclick = () => openLightbox(img.src, caption || '');
    gallery.appendChild(item);
  });

  function openLightbox(src, caption) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-caption').textContent = caption;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
